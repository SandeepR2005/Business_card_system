<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AskEva · Event Lead Capture</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0F1F08; font-family: 'Inter', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body {
    overflow: hidden;
    background:
      radial-gradient(60% 50% at 50% 30%, rgba(82,196,26,0.10) 0%, transparent 70%),
      linear-gradient(135deg, #0F1F08 0%, #06120A 100%);
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  input, textarea { font-family: inherit; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>

<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="login.jsx"></script>
<script type="text/babel" src="screens-1.jsx"></script>
<script type="text/babel" src="screens-2.jsx"></script>
<script type="text/babel" src="screens-3.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel" data-presets="react">
  // Mount once all scripts have loaded
  const tryMount = () => {
    if (window.App && window.IOSDevice && window.SEED_LEADS && window.ScreenHome && window.ScreenLogin && window.ScreenRecap && window.ScreenMyCard) {
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    } else {
      setTimeout(tryMount, 50);
    }
  };
  tryMount();
</script>
</body>
</html>
